# Nginx configuration for ClickCS Valheim modpack hosting
# Place this in /etc/nginx/sites-available/ and symlink to sites-enabled/
# Then: sudo nginx -t && sudo systemctl reload nginx

server {
    listen 443 ssl http2;
    server_name mods.yourserver.com;  # <-- CHANGE THIS

    # SSL (Let's Encrypt)
    ssl_certificate     /etc/letsencrypt/live/mods.yourserver.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mods.yourserver.com/privkey.pem;

    root /var/www/mods;  # <-- CHANGE THIS to your web root

    # Modpack files
    location /valheim/ {
        autoindex off;

        # manifest.json — never cache (players need the latest version)
        location ~* manifest\.json$ {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header X-Content-Type-Options "nosniff";
        }

        # Mod files — cache for 24h (hash-verified by launcher anyway)
        location ~* \.(dll|cfg|ini|txt|png|jpg)$ {
            add_header Cache-Control "public, max-age=86400";
        }
    }

    # Launcher self-update (optional)
    location /valheim/launcher/ {
        add_header Cache-Control "no-cache";
    }

    # Block directory listing everywhere
    location / {
        return 404;
    }
}

# HTTP redirect to HTTPS
server {
    listen 80;
    server_name mods.yourserver.com;
    return 301 https://$host$request_uri;
}
